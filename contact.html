            <p class="label">CONTACT US </p>
            <h1>CONTACT</h1>
            <p class="sub">Have a question or a project? Send us a message and we’ll get back to you shortly.</p>
        </div>

        <form class="message" action="https://formspree.io/f/mpwdgvzk" method="post">

            <div class="row-2">
                <div class="field">
                    <label for="nom">Last Name</label>
                    <input type="text" id="nom" name="nom" placeholder="Smith" required>
                </div>
                <div class="field">
                    <label for="prenom">First Name</label>
                    <input type="text" id="prenom" name="prenom" placeholder="James" required>
                </div>
            </div>

            <div class="row-2">
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="james@email.com" required>
                </div>
                <div class="field">
                    <label for="adresse">Address</label>
                    <input type="text" id="adresse" name="adresse" placeholder="12 Acacia Street" required>
                </div>
            </div>

            <div class="divider"></div>

            <div class="field" id="mess">
                <label for="message-id">Message</label>
                <textarea id="message-id" name="message" placeholder="Your message..." required></textarea>
            </div>

            <div class="submit-row">
                <span class="hint">* Required fields</span>
                <button type="submit" class="btn-submit">SUBMIT</button>
            </div>

        </form>
